paths:
  /basket:
    post:
      tags:
        - BasketController
      summary: 1. Создать корзину
      operationId: createBasket
      responses:
        '201':
          description: Корзина создана
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Basket'

  /basket/{basketId}:
    get:
      tags:
        - BasketController
      summary: 2. Получить корзину
      operationId: getBasket
      parameters:
        - name: basketId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Basket'
        '404':
          description: Корзина не найдена

  /basket/{basketId}/items:
    post:
      tags:
        - BasketController
      summary: 3. Добавить товар в корзину
      operationId: addToBasket
      parameters:
        - name: basketId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - productId
                - quantity
              properties:
                productId:
                  type: integer
                quantity:
                  type: integer
                  minimum: 1
                  default: 1
      responses:
        '200':
          description: Товар добавлен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Basket'
        '404':
          description: Товар не найден